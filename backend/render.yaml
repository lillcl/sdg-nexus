services:
  - type: web
    name: sdg-nexus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://pmqvoluuqmurruedohic.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL intentionally removed — using Supabase only
      - key: AI_PROVIDER
        value: openai   # Use Groq or OpenAI
      - key: OLLAMA_BASE_URL
        # To use your LOCAL Ollama from Render:
        # 1. Install ngrok: https://ngrok.com
        # 2. Run: ngrok http 11434
        # 3. Set this to your ngrok URL e.g. https://abc123.ngrok.io
        # OR use Cloudflare Tunnel, or any public tunnel to localhost:11434
        value: http://localhost:11434
      - key: OPENAI_API_KEY
        sync: false   # Your Groq API key: gsk_...
      - key: OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OPENAI_MODEL
        value: llama-3.1-70b-versatile
      - key: DATABASE_PASSWORD
        sync: false
